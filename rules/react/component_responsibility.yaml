id: component_responsibility
title: React component responsibility
description: React components should focus on UI composition and interactions, not hidden server-only data access or persistence details.
pack: web
default_mode: advisory
severity: medium
applies_to:
  languages: [typescript, javascript]
  paths: [src, apps, packages]
scan:
  path_hints: [component, components, app]
implementation:
  guard:
    status: builtin
    scanner: scanClientServerBoundary
    confidence: heuristic
    finding_ids:
      - boundary.import.server_in_client
recommendation:
  changed_files: true
  baseline_supported: true
public_safe_examples:
  bad: Import a database client into a client component.
  good: Fetch through a server boundary or pass already-shaped data into the component.
