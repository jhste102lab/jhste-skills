id: sql_parameter_binding
title: SQL parameter binding
description: SQL that includes external values should use parameter binding or a safe query abstraction.
pack: database
default_mode: advisory
severity: high
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, apps, packages, scripts]
scan:
  patterns: ["SELECT", "INSERT", "UPDATE", "DELETE", "${", "f\""]
implementation:
  guard:
    status: builtin
    scanner: scanSqlParameterBinding
    confidence: heuristic
    finding_ids:
      - sql.raw_interpolation
recommendation:
  changed_files: true
  baseline_supported: true
public_safe_examples:
  bad: Interpolate request input directly into a SQL string.
  good: Use placeholders and pass values separately.
