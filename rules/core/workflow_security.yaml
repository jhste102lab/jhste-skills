id: workflow_security
title: Workflow security
description: GitHub Actions workflows should avoid direct shell interpolation of external inputs and should pin third-party actions when practical.
pack: core
default_mode: advisory
severity: high
applies_to:
  languages: [yaml]
  paths: [.github/workflows]
scan:
  keywords: [run, uses, github.event.inputs, inputs]
implementation:
  guard:
    status: builtin
    scanner: scanWorkflowSecurity
    confidence: heuristic
    finding_ids:
      - workflow.input_interpolation.run
      - workflow.action.unpinned
recommendation:
  changed_files: true
  baseline_supported: true
public_safe_examples:
  bad: Interpolate dispatch input directly into a shell run command.
  good: Pass input through env, validate it, and pin external actions where feasible.
