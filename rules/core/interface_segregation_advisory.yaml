id: interface_segregation_advisory
title: Interface segregation advisory
description: Callers should not depend on broad config, interface, or props bags when they use only a narrow slice, unless the contract is intentionally cohesive.
pack: core
default_mode: advisory
severity: medium
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, app, apps, packages, scripts, cli]
scan:
  type: human_review
  signals:
    - broad_contract_partial_use
    - cohesive_contract_review
implementation:
  guard:
    status: metadata_only
    confidence: human_review_required
recommendation:
  changed_files: true
  baseline_supported: false
  default_enforcement: review_only
public_safe_examples:
  bad: Pass a large config, interface, or props object into a caller that reads only one or two fields, forcing unrelated change coupling.
  good: Depend on the smallest useful contract, while keeping cohesive public contracts together when they are read and changed together.
