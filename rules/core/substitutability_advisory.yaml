id: substitutability_advisory
title: Substitutability advisory
description: Implementations and subtypes should preserve caller contracts for return shape, nullability, error behavior, side effects, and documented invariants.
pack: core
default_mode: advisory
severity: medium
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, app, apps, packages, scripts, cli]
scan:
  type: human_review
  signals:
    - caller_contract_preservation
    - return_shape_and_error_behavior
implementation:
  guard:
    status: metadata_only
    confidence: human_review_required
recommendation:
  changed_files: true
  baseline_supported: false
  default_enforcement: review_only
public_safe_examples:
  bad: Add an implementation that returns null where callers expect a value, throws new unsupported errors, or skips a side effect the interface promises.
  good: Preserve the caller-visible contract or make the changed contract explicit at the boundary with tests for the affected behavior.
