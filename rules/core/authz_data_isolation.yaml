id: authz_data_isolation
title: Authz and data isolation
description: Routes and controllers that read or mutate user data should make auth context and tenant or owner scoping visible.
pack: core
default_mode: advisory
severity: high
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, app, apps, packages]
scan:
  keywords: [auth, session, currentUser, permission, userId, orgId, accountId, ownerId]
recommendation:
  changed_files: true
  baseline_supported: true
public_safe_examples:
  bad: Read or mutate shared data after auth without showing any owner or tenant filter.
  good: Make auth context and ownership scope explicit in the query or service call.
