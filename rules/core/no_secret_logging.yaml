id: no_secret_logging
title: No secret logging
description: Secret-like values and raw sensitive payloads must not be logged, returned, or written to scan reports.
pack: core
default_mode: advisory
severity: high
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, apps, packages, scripts]
scan:
  redacted_keywords: [secret, token, password, authorization, cookie, session]
implementation:
  guard:
    status: builtin
    scanner: scanSecretLogging
    confidence: heuristic
    finding_ids:
      - secret.logging
recommendation:
  changed_files: true
  baseline_supported: true
public_safe_examples:
  bad: Log an authorization header or raw session payload.
  good: Log a stable request id and a redacted reason code.
