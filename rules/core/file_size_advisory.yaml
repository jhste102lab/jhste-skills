id: file_size_advisory
title: File size advisory
description: Hand-written source files that grow beyond the profile threshold should be reviewed for responsibility splits.
pack: core
default_mode: advisory
severity: medium
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, apps, packages, scripts]
settings:
  source_file_warning_lines: 400
  source_file_review_lines: 600
scan:
  type: line_count
implementation:
  guard:
    status: builtin
    scanner: scanFileSizeAdvisory
    confidence: heuristic
    finding_ids:
      - file_size.warning
      - file_size.review
recommendation:
  changed_files: false
  baseline_supported: true
public_safe_examples:
  bad: Add more unrelated responsibilities to an already large source file.
  good: Extract a tested service, adapter, or component when a file has multiple reasons to change.
