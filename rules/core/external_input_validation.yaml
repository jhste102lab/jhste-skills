id: external_input_validation
title: External input validation
description: User input, API payloads, files, environment variables, database rows, and third-party responses are not trusted until validated.
pack: core
default_mode: advisory
severity: high
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, apps, packages, scripts]
scan:
  boundary_hints: [request, payload, params, env, file, response]
recommendation:
  changed_files: true
  baseline_supported: false
public_safe_examples:
  bad: Pass an unvalidated request body directly into domain logic.
  good: Check required fields, enum values, ranges, and lengths at the boundary.
