id: dependency_boundary_advisory
title: Dependency boundary advisory
description: High-level policy should not directly own concrete DB, API, browser, filesystem, email, payment, or queue side effects unless that dependency is intentionally local and visible.
pack: core
default_mode: advisory
severity: medium
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, app, apps, packages, scripts, cli]
scan:
  type: solid_dependency_boundary
  signals:
    - concrete_side_effect_dependency_in_policy_path
implementation:
  guard:
    status: builtin
    scanner: scanDependencyBoundaryAdvisory
    confidence: heuristic
    finding_ids:
      - solid.dip.concrete_side_effect_dependency
recommendation:
  changed_files: true
  baseline_supported: true
  default_enforcement: review_only
public_safe_examples:
  bad: Let service or policy code create concrete database, payment, email, filesystem, browser, or network clients inline.
  good: Make concrete side effects explicit through an adapter, repository, injected dependency, or intentionally local boundary that callers and tests can see.
