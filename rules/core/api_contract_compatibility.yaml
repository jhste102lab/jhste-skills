id: api_contract_compatibility
title: API contract compatibility
description: Public request and response boundaries should use visible parsing or contract checks so callers do not silently drift.
pack: core
default_mode: advisory
severity: medium
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, app, apps, packages]
scan:
  keywords: [request.json, req.body, params, searchParams, schema, safeParse, validate]
recommendation:
  changed_files: true
  baseline_supported: true
public_safe_examples:
  bad: Accept request body or params directly and rely on callers to stay in sync.
  good: Parse the boundary with an explicit schema or validator before using it.
