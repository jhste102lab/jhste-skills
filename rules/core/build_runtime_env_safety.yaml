id: build_runtime_env_safety
title: Build, runtime, and env safety
description: Environment and runtime assumptions should be validated or guarded before they can break builds, deploys, or startup paths.
pack: core
default_mode: advisory
severity: medium
applies_to:
  languages: [typescript, javascript, python]
  paths: [src, app, apps, packages, scripts]
scan:
  keywords: [process.env, import.meta.env, os.getenv]
recommendation:
  changed_files: true
  baseline_supported: true
public_safe_examples:
  bad: Read a required env var directly and assume it is always present and valid.
  good: Validate required env values once and fail with a clear setup error or safe fallback.
