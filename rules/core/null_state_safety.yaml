id: null_state_safety
title: Null and state safety
description: Non-null assertions and async UI flows should not rely on fragile assumptions about null, empty, loading, or error states.
pack: core
default_mode: advisory
severity: medium
applies_to:
  languages: [typescript, javascript]
  paths: [src, app, apps, packages]
scan:
  patterns: ["!.", "fetch(", "useQuery(", "isLoading", "error"]
recommendation:
  changed_files: true
  baseline_supported: true
public_safe_examples:
  bad: Assume nullable data is always present and render without loading or error fallbacks.
  good: Guard nullable values and make loading, empty, and error states explicit on affected paths.
