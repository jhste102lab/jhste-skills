id: broad_exception_advisory
title: Broad exception advisory
description: Broad Python exception handlers should expose a clear fallback reason or redacted diagnostic path.
pack: core
default_mode: advisory
severity: medium
applies_to:
  languages: [python]
  paths: [src, apps, packages, scripts]
scan:
  patterns: ["except Exception", "except:"]
recommendation:
  changed_files: true
  baseline_supported: true
public_safe_examples:
  bad: Swallow every exception and continue as if work succeeded.
  good: Catch a specific exception or record a redacted warning before a documented fallback.
